bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: base_link
    odom_frame: odom
    bt_loop_duration: 10
    default_bt_xml_filename: "/opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"

controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    controller_plugins: ["FollowPath"]
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]


    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.3
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      desired_linear_vel: 0.2
      lookahead_dist: 0.6
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.9
      lookahead_time: 1.0

      rotate_to_heading_angular_vel: 0.5

      transform_tolerance: 0.5
      use_velocity_scaled_lookahead_dist: false

      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6

      use_collision_detection: true

      allow_reversing: false

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: True
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner" 
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: True
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      #robot_radius: 0.3
      footprint: "[ [0.25, 0.15], [0.25, -0.15], [-0.25, -0.15], [-0.25, 0.15] ]"
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          data_type: LaserScan
          marking: true
          clearing: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.55


global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: True
      rolling_window: true  # <--- KLUCZOWE: Włącz to!
      width: 5             # Ustaw dużą mapę globalną, np. 10x10m
      height: 5
      resolution: 0.05
      origin_x: 0.0
      origin_y: 0.0
      #robot_radius: 0.3
      footprint: "[ [0.25, 0.15], [0.25, -0.15], [-0.25, -0.15], [-0.25, 0.15] ]"
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        enabled: True
        subscribe_to_updates: True
      #plugins: ["obstacle_layer", "inflation_layer"] # BEZ static_layer

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        footprint_clearing_enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: LaserScan
          marking: true
          clearing: false
          raytrace_range: 3.0 # Zasięg "widzenia" w mapie
          obstacle_range: 2.5 # Zasięg, w którym robot "zapisuje" przeszkody

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: True
        cost_scaling_factor: 5.0
        inflation_radius: 0.4

collision_monitor:
  ros__parameters:
    use_sim_time: True
    base_frame_id: "base_link"
    odom_frame_id: "odom"

    transform_timeout: 0.5
    source_timeout: 3.0
    stop_pub_timeout: 3.0

    observation_sources: ["scan"]

    scan:
      type: "scan"
      topic: "/scan"

    polygons: ["VelocityStop"]

    VelocityStop:
      type: "polygon"
      points: "[[0.25, 0.1], [0.25, -0.1], [-0.25, -0.1], [-0.25, 0.1]]"
      action_type: "stop"
      max_points: 3
      visualize: True

behavior_server:
  ros__parameters:
    use_sim_time: True
    behaviors: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    wait:
      plugin: "nav2_behaviors::Wait"

smoother_server:
  ros__parameters:
    use_sim_time: True
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 0.05
      max_its: 1000
      w_data: 0.2
      w_smooth: 0.3


waypoint_follower:
  ros__parameters:
    use_sim_time: True
    loop_rate: 20
    stop_on_failure: False
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200


velocity_smoother:
  ros__parameters:
    use_sim_time: True
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.5, 0.0, 1.0]
    min_velocity: [-0.5, 0.0, -1.0]
    max_accel: [0.5, 0.0, 1.0]   # Zmniejszone z 1.0 i 2.0
    max_decel: [-0.5, 0.0, -1.0] # Zmniejszone z -1.0 i -2.0
    odom_topic: "/odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

docking_server:
  ros__parameters:
    use_sim_time: True

    controller_frequency: 50.0
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    fixed_frame_id: "map"

    dock_plugins: ["simple_dock"]

    simple_dock:
      plugin: "opennav_docking::SimpleChargingDock"

      docking_threshold: 0.05
      staging_x_offset: -0.7
      staging_yaw_offset: 0.0

      use_external_detection_pose: false
      use_battery_status: false
      use_stall_detection: false

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: True
    autostart: True
    node_names: [
      'planner_server', 
      'controller_server', 
      'behavior_server',
      'smoother_server',
      'bt_navigator', 
      'waypoint_follower',
      'velocity_smoother',
      'collision_monitor',
      'docking_server'
    ]