laser_scan_matcher:
  ros__parameters:
    # Kluczowy parametr do działania w Gazebo
    use_sim_time: true
    
    # Ramki TF (dopasowane do Twojego robota)
    base_frame: "base_link"
    odom_frame: "odom"
    laser_frame: "lidar_link"
    
    # Tematy (Topics)
    publish_odom: "/odom"
    publish_tf: true

    # Parametry dopasowywania skanów (ICP)
    max_iterations: 5
    max_correspondence_dist: 0.3
    max_angular_correction_deg: 45.0
    max_linear_correction: 0.5
    epsilon_xy: 0.000001
    epsilon_theta: 0.000001
    outliers_maxPerc: 0.90